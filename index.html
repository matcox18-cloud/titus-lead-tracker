<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Titus CPAs — Lead Tracker</title>
<meta name="theme-color" content="#132b49" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Titus Leads" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Adamina&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --navy:#132b49; --navy-700:#1c3a5e; --navy-600:#27496e; --gold:#d1af44; --gold-soft:#e7d599;
  --ink:#22272e; --muted:#76746e; --line:#e7e2d6; --bg:#f3f0e9; --card:#ffffff; --white:#fff;
  --good:#2f9e74; --good-bg:#e6f4ee; --warn:#c9803a; --warn-bg:#fbefe2; --danger:#c0473e; --danger-bg:#fbeae8;
  --shadow:0 1px 2px rgba(19,43,73,.06), 0 6px 18px rgba(19,43,73,.06);
  --shadow-lg:0 12px 40px rgba(19,43,73,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Instrument Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased}
.serif{font-family:'Adamina',Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cdd4dd;border-radius:8px}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--navy);color:#cdd8e6;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:40}
.brand{padding:22px 20px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.tc-mark{width:34px;height:38px;flex-shrink:0}
.brand-text{line-height:1}
.brand-text .b1{font-family:'Adamina',serif;font-weight:600;font-size:21px;color:#fff;letter-spacing:.2px}
.brand-text .b2{font-size:9.5px;letter-spacing:3px;color:var(--gold);font-weight:600;margin-top:3px}
.nav{padding:14px 12px;flex:1}
.nav-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#6f86a3;padding:10px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 12px;border-radius:10px;color:#bcc9da;font-weight:500;font-size:14px;margin-bottom:2px;transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--gold);color:var(--navy);font-weight:600}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#6f86a3}
.nav-foot .tagline{font-family:'Adamina',serif;font-style:italic;color:#9fb0c6;font-size:12.5px;margin-bottom:4px}

.main{flex:1;margin-left:248px;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar h1{font-family:'Adamina',serif;font-size:20px;font-weight:600;color:var(--navy);white-space:nowrap}
.topbar .sub{color:var(--muted);font-size:12.5px;margin-top:1px}
.search{flex:1;max-width:380px;position:relative}
.search input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:9px;background:#fbfcfd}
.search input:focus{outline:none;border-color:var(--gold);background:#fff}
.search svg{position:absolute;left:11px;top:9px;width:17px;height:17px;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-weight:600;font-size:13.5px;transition:.15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:#c39f33}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-700)}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:#c9d0da;background:#fbfcfd}
.btn svg{width:16px;height:16px}
.spacer{flex:1}
.avatar-me{width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}

.content{padding:24px 26px 60px;flex:1}
.mobile-top{display:none}
.mobile-searchbar{display:none}
.bottom-nav{display:none}

/* ---------- KPI cards ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.kpi .lab{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.kpi .lab .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi .ic svg{width:16px;height:16px}
.kpi .val{font-family:'Adamina',serif;font-size:30px;font-weight:600;color:var(--navy);margin-top:12px;line-height:1}
.kpi .delta{font-size:12px;margin-top:7px;color:var(--muted)}
.kpi .delta b{color:var(--good)}
.ic-navy{background:#eaf0f7;color:var(--navy)}
.ic-gold{background:#faf3dd;color:#a8862a}
.ic-green{background:var(--good-bg);color:var(--good)}
.ic-red{background:var(--danger-bg);color:var(--danger)}

.dash-row{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.panel-head h3{font-family:'Adamina',serif;font-size:16px;font-weight:600;color:var(--navy)}
.panel-head .hint{font-size:11.5px;color:var(--muted)}
.panel-body{padding:16px 18px}

/* funnel */
.funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.funnel-row .nm{width:120px;font-size:12.5px;color:var(--ink);font-weight:500;flex-shrink:0}
.funnel-bar{flex:1;height:26px;background:#ece7da;border-radius:7px;overflow:hidden}
.funnel-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--navy-600));border-radius:7px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11.5px;font-weight:600;min-width:26px}
.funnel-row .ct{width:78px;text-align:right;font-size:12px;color:var(--muted);flex-shrink:0}

/* lists */
.mini-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid #f0f2f5}
.mini-row:last-child{border-bottom:none}
.mini-av{width:34px;height:34px;border-radius:9px;background:#eaf0f7;color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.mini-main{flex:1;min-width:0}
.mini-main .nm{font-weight:600;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-main .sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-end{text-align:right;flex-shrink:0}

/* origination table */
.orig-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f0f2f5}
.orig-row:last-child{border-bottom:none}
.orig-row .nm{flex:1;font-weight:600;font-size:13px}
.orig-bar{width:120px;height:8px;background:#ece7da;border-radius:5px;overflow:hidden}
.orig-bar i{display:block;height:100%;background:var(--gold)}
.orig-row .val{width:84px;text-align:right;font-size:12.5px;font-weight:600;color:var(--navy)}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tier1{background:#eaf0f7;color:var(--navy)}
.tier2{background:#faf3dd;color:#a8862a}
.tier3{background:#ece7da;color:#5a6675}
.pill-src{background:#efeadf;color:#54627a;border:1px solid #e4e9f0}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:0 0 auto;margin-right:7px;vertical-align:middle}

/* ---------- Pipeline / Kanban ---------- */
.pipe-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-sel{padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-weight:500}
.filter-sel:focus{outline:none;border-color:var(--gold)}
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:18px;align-items:flex-start}
.col{width:268px;flex-shrink:0;background:#ece7da;border-radius:13px;display:flex;flex-direction:column;max-height:calc(100vh - 230px)}
.col-head{padding:13px 14px 10px;position:sticky;top:0}
.col-head .t{display:flex;align-items:center;font-weight:700;font-size:13px;color:var(--navy)}
.col-head .meta{display:flex;justify-content:space-between;margin-top:7px;font-size:11.5px;color:var(--muted)}
.col-head .ct{background:#fff;border-radius:20px;padding:1px 9px;font-size:11px;font-weight:700;color:var(--navy)}
.col-body{padding:0 10px 12px;overflow-y:auto;flex:1}
.col.drop-on{background:#e3eaf3;outline:2px dashed var(--gold);outline-offset:-4px}
.card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:10px;box-shadow:0 1px 2px rgba(19,43,73,.05);cursor:grab;transition:.12s}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:#d7dde6}
.card.dragging{opacity:.45}
.card .ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card .nm{font-weight:700;font-size:13.5px;color:var(--ink);line-height:1.25}
.card .co{font-size:12px;color:var(--muted);margin-top:1px}
.card .row2{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.card .val{font-family:'Adamina',serif;font-weight:600;color:var(--navy);font-size:14px}
.card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px solid #f0f2f5}
.card .nextstep{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#54627a;min-width:0}
.card .nextstep svg{width:13px;height:13px;flex-shrink:0;color:var(--gold)}
.card .nextstep span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.owner-chip{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.touch{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.touch.overdue{color:var(--danger);font-weight:600}

/* ---------- Table ---------- */
.table-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;padding:13px 16px;border-bottom:1px solid var(--line);background:#faf8f2;white-space:nowrap}
tbody td{padding:13px 16px;border-bottom:1px solid #f0f2f5;font-size:13px;vertical-align:middle}
tbody tr{cursor:pointer;transition:.1s}
tbody tr:hover{background:#faf8f2}
tbody tr:last-child td{border-bottom:none}
.t-name{font-weight:700;color:var(--ink)}
.t-co{font-size:11.5px;color:var(--muted)}
.stage-tag{display:inline-flex;align-items:center;font-weight:600;font-size:12px}

/* ---------- Drawer ---------- */
.overlay{position:fixed;inset:0;background:rgba(19,43,73,.45);z-index:50;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:94vw;background:#fff;z-index:60;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.show{transform:translateX(0)}
.dr-head{background:var(--navy);color:#fff;padding:20px 22px}
.dr-head .top{display:flex;justify-content:space-between;align-items:flex-start}
.dr-head .nm{font-family:'Adamina',serif;font-size:22px;font-weight:600}
.dr-head .co{color:#aebfd4;font-size:13.5px;margin-top:2px}
.dr-close{color:#aebfd4;font-size:22px;line-height:1;padding:2px 6px;border-radius:6px}
.dr-close:hover{background:rgba(255,255,255,.12);color:#fff}
.dr-badges{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.dr-body{flex:1;overflow-y:auto;padding:20px 22px}
.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;margin-bottom:8px}
.field .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:3px}
.field .v{font-size:13.5px;color:var(--ink);font-weight:500}
.field .v a{color:var(--navy)}
.sect-title{font-family:'Adamina',serif;font-size:15px;font-weight:600;color:var(--navy);margin:22px 0 12px;display:flex;align-items:center;gap:8px}
.sect-title::after{content:"";flex:1;height:1px;background:var(--line)}
.nextbox{background:#faf6e8;border:1px solid #ecdfb4;border-radius:11px;padding:14px}
.nextbox .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#a8862a;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.nextbox .act{font-weight:600;font-size:14px;color:var(--ink)}
.nextbox .due{font-size:12px;color:var(--muted);margin-top:3px}

.stage-pick{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.stage-pick button{padding:6px 10px;border-radius:8px;font-size:11.5px;font-weight:600;background:#efeadf;color:#54627a;border:1px solid transparent}
.stage-pick button.on{background:var(--navy);color:#fff}
.stage-pick button:hover{border-color:var(--gold)}

/* timeline */
.timeline{position:relative;padding-left:26px}
.timeline::before{content:"";position:absolute;left:9px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-22px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center}
.tl-dot svg{width:9px;height:9px;color:var(--navy)}
.tl-item .h{display:flex;justify-content:space-between;gap:8px}
.tl-item .ty{font-weight:600;font-size:13px;color:var(--ink)}
.tl-item .dt{font-size:11px;color:var(--muted);white-space:nowrap}
.tl-item .nt{font-size:12.5px;color:#54627a;margin-top:2px;line-height:1.4}
.tl-item .by{font-size:11px;color:var(--muted);margin-top:3px}

.logbox{background:#faf8f2;border:1px solid var(--line);border-radius:11px;padding:14px;margin-top:6px}
.logbox .lr{display:flex;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.logbox select,.logbox input,.logbox textarea{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
.logbox textarea{resize:vertical;min-height:54px;width:100%}
.logbox select:focus,.logbox input:focus,.logbox textarea:focus{outline:none;border-color:var(--gold)}

/* ---------- Modal ---------- */
.modal{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.modal.show{opacity:1;pointer-events:auto}
.modal-card{background:#fff;border-radius:16px;width:560px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateY(12px);transition:.2s}
.modal.show .modal-card{transform:none}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-family:'Adamina',serif;font-size:19px;color:var(--navy);font-weight:600}
.modal-body{padding:22px 24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg-full{grid-column:1/-1}
.form-grid label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.form-grid input,.form-grid select,.form-grid textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fbfcfd}
.form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{outline:none;border-color:var(--gold);background:#fff}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.empty svg{width:42px;height:42px;color:#c9d2dd;margin-bottom:10px}

/* ---------- Responsive ---------- */
@media(max-width:1040px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.dash-row{grid-template-columns:1fr}}
@media(max-width:860px){
  .sidebar{display:none}
  .main{margin-left:0}
  .topbar{display:none}
  .mobile-top{display:flex;align-items:center;gap:12px;background:var(--navy);color:#fff;padding:14px 18px;position:sticky;top:0;z-index:30}
  .mobile-top .tc-mark{width:28px;height:32px}
  .mobile-top .b1{font-family:'Adamina',serif;font-size:18px;color:#fff;font-weight:600}
  .mobile-top .b2{font-size:8.5px;letter-spacing:2.5px;color:var(--gold);font-weight:600}
  .mobile-search{margin-left:auto;width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
  .mobile-search svg{width:18px;height:18px;color:#fff}
  .content{padding:16px 14px 96px}
  .kpi-grid{gap:11px}
  .kpi{padding:14px;border-radius:12px}
  .kpi .val{font-size:24px}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:45;padding:6px 4px 8px;box-shadow:0 -4px 20px rgba(19,43,73,.07)}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--muted);font-size:10.5px;font-weight:600;border-radius:9px}
  .bn-item svg{width:21px;height:21px}
  .bn-item.active{color:var(--navy)}
  .bn-item.active svg{color:var(--gold)}
  .bn-add{color:var(--gold)}
  .bn-add .plus{width:38px;height:38px;border-radius:12px;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;margin-top:-16px;box-shadow:var(--shadow)}
  .bn-add .plus svg{width:22px;height:22px}
  .drawer{width:100%;max-width:100%}
  .dr-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .mobile-searchbar{padding:10px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:25;display:none}
  .mobile-searchbar.open{display:block}
  .mobile-searchbar input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px}
}
/* ---------- Login / cloud ---------- */
#login{position:fixed;inset:0;z-index:90;background:linear-gradient(160deg,#0f2440,#1c3a5e);display:none;align-items:center;justify-content:center;padding:24px}
#login.show{display:flex}
.login-card{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);width:400px;max-width:100%;padding:36px 32px;text-align:center}
.login-card .tc-mark{width:54px;height:60px;margin:0 auto 14px;display:block}
.login-card h2{font-family:'Adamina',serif;color:var(--navy);font-size:24px;font-weight:600}
.login-card .tag{font-family:'Adamina',serif;font-style:italic;color:var(--muted);font-size:13.5px;margin-top:6px;margin-bottom:24px}
.login-card label{display:block;text-align:left;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.login-card input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:#fbfcfd;margin-bottom:14px}
.login-card input:focus{outline:none;border-color:var(--gold);background:#fff}
.login-card .btn{width:100%;justify-content:center;padding:12px}
.login-msg{font-size:13px;margin-top:16px;color:var(--good);min-height:18px;line-height:1.4}

/* ============================ HELPERS ============================ */
function filtered(){
  const q = state.search.trim().toLowerCase();
  return LEADS.filter(l=>{
    if(state.fOwner && l.origination!==state.fOwner) return false;
    if(state.fSource && l.source!==state.fSource) return false;
    if(state.fTier && l.tier!==state.fTier) return false;
    if(q){
      const hay = (l.name+' '+l.company+' '+l.owner+' '+l.origination+' '+l.source).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function isOverdue(l){ return l.nextStep && l.nextStep.due && l.nextStep.due < TODAY_ISO && l.stage!=='won' && l.stage!=='lost'; }
function tierBadge(t){ const T=TIERS[t]; return `<span class="badge ${T.cls}">${T.label}</span>`; }
function srcPill(s){ return `<span class="badge pill-src">${s}</span>`; }

/* ============================ NAV ============================ */
const NAVS = [
  {id:'dashboard', name:'Dashboard', icon:I.dash, title:'Dashboard', sub:'Lead pipeline overview'},
  {id:'pipeline',  name:'Pipeline',  icon:I.pipe, title:'Pipeline', sub:'Drag leads across stages'},
  {id:'leads',     name:'All Leads', icon:I.list, title:'All Leads', sub:'Complete lead list'}
];
function renderNav(){
  document.getElementById('brandLogo').innerHTML = `<img class="brand-logo" src="${LOGO_DARK}" alt="Titus CPAs" />`;
  document.getElementById('mobileBrand').innerHTML = `<img class="brand-logo-m" src="${LOGO_DARK}" alt="Titus CPAs" />`;
  const menu = document.getElementById('navMenu');
  menu.innerHTML = '<div class="nav-label">Sales</div>' + NAVS.map(n=>
    `<button class="nav-item ${state.view===n.id?'active':''}" data-view="${n.id}"><span style="display:flex">${svg(n.icon)}</span>${n.name}</button>`
  ).join('')
  + '<div class="nav-label" style="margin-top:10px">Resources</div>'
  + `<button class="nav-item ${state.view==='help'?'active':''}" data-view="help"><span style="display:flex">${svg(I.book)}</span>Instructions</button>`;
  menu.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>setView(b.dataset.view));
  const bn = document.getElementById('bottomNav');
  bn.innerHTML = NAVS.map(n=>`<button class="bn-item ${state.view===n.id?'active':''}" data-view="${n.id}">${svg(n.icon)}<span>${n.name}</span></button>`).join('')
    + `<button class="bn-item bn-add" id="bnAdd"><span class="plus">${svg(I.add,2.4)}</span><span>Add</span></button>`;
  bn.querySelectorAll('.bn-item[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));
  document.getElementById('bnAdd').onclick=openAdd;
}
function setView(v){ state.view=v; const n=NAVS.find(x=>x.id===v)||{title:'Instructions',sub:'How to use the Lead Tracker'}; document.getElementById('pageTitle').textContent=n.title; document.getElementById('pageSub').textContent=n.sub; renderNav(); render(); window.scrollTo(0,0); }

/* ============================ RENDER ============================ */
function render(){
  const c = document.getElementById('content');
  if(state.view==='dashboard') c.innerHTML = viewDashboard();
  else if(state.view==='pipeline') c.innerHTML = viewPipeline();
  else if(state.view==='help') c.innerHTML = viewHelp();
  else c.innerHTML = viewLeads();
  bindContent();
}

/* ---- Dashboard ---- */
function viewDashboard(){
  const open = LEADS.filter(l=>l.stage!=='won' && l.stage!=='onboarding' && l.stage!=='lost');
  const pipelineVal = open.reduce((s,l)=>s+l.value,0);
  const wonMonth = LEADS.filter(l=>(l.stage==='won'||l.stage==='onboarding'));
  const wonVal = wonMonth.reduce((s,l)=>s+l.value,0);
  const overdue = LEADS.filter(isOverdue);
  const kpis = [
    {lab:'Open Leads', ic:'ic-navy', icon:I.users, val:open.length, delta:`<b>+4</b> added this week`},
    {lab:'Pipeline Value', ic:'ic-gold', icon:I.money, val:fmtMoney(pipelineVal), delta:`Weighted across ${open.length} active leads`},
    {lab:'Won (MTD)', ic:'ic-green', icon:I.trophy, val:wonMonth.length, delta:`${fmtMoney(wonVal)} in new annual fees`},
    {lab:'Need Follow-Up', ic:'ic-red', icon:I.alert, val:overdue.length, delta:overdue.length?`Overdue next steps`:`All caught up`}
  ];
  const kpiHTML = kpis.map(k=>`<div class="kpi"><div class="lab"><span class="ic ${k.ic}">${svg(k.icon)}</span>${k.lab}</div><div class="val">${k.val}</div><div class="delta">${k.delta}</div></div>`).join('');

  // funnel
  const maxCt = Math.max(...STAGES.map(s=>LEADS.filter(l=>l.stage===s.id).length),1);
  const funnel = STAGES.map(s=>{
    const items = LEADS.filter(l=>l.stage===s.id);
    const ct = items.length; const val = items.reduce((a,b)=>a+b.value,0);
    const w = Math.max(ct/maxCt*100, ct?9:0);
    return `<div class="funnel-row"><div class="nm">${s.name}</div><div class="funnel-bar"><div class="funnel-fill" style="width:${w}%">${ct||''}</div></div><div class="ct">${fmtMoney(val)}</div></div>`;
  }).join('');

  // origination leaderboard (comp infrastructure)
  const origMax = Math.max(...OWNERS.map(o=>LEADS.filter(l=>l.origination===o).reduce((a,b)=>a+b.value,0)),1);
  const orig = OWNERS.map(o=>{
    const items = LEADS.filter(l=>l.origination===o);
    const val = items.reduce((a,b)=>a+b.value,0);
    return {o, ct:items.length, val};
  }).sort((a,b)=>b.val-a.val).map(r=>
    `<div class="orig-row"><div class="mini-av">${initials(r.o)}</div><div class="nm">${r.o}<div style="font-size:11px;color:var(--muted);font-weight:400">${r.ct} leads originated</div></div><div class="orig-bar"><i style="width:${r.val/origMax*100}%"></i></div><div class="val">${fmtMoney(r.val)}</div></div>`
  ).join('');

  // needs attention
  const attn = [...overdue].sort((a,b)=>new Date(a.nextStep.due)-new Date(b.nextStep.due));
  const attnHTML = attn.length ? attn.map(l=>`
    <div class="mini-row" data-open="${l.id}" style="cursor:pointer">
      <div class="mini-av" style="background:var(--danger-bg);color:var(--danger)">${initials(l.name)}</div>
      <div class="mini-main"><div class="nm">${l.name}</div><div class="sub">${l.nextStep.action}</div></div>
      <div class="mini-end"><div class="touch overdue">Due ${fmtDate(l.nextStep.due)}</div><div style="font-size:11px;color:var(--muted)">${stageById(l.stage).name}</div></div>
    </div>`).join('') : `<div class="empty">${svg(I.trophy)}<div>No overdue follow-ups. Nicely done.</div></div>`;

  // recent activity (latest touch across leads)
  const recent = [...LEADS].sort((a,b)=>new Date(b.lastTouch.date)-new Date(a.lastTouch.date)).slice(0,6).map(l=>`
    <div class="mini-row" data-open="${l.id}" style="cursor:pointer">

function bindContent(){
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openDrawer(+el.dataset.open));
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>tr.onclick=()=>openDrawer(+tr.dataset.id));
  ['fOwner','fSource','fTier'].forEach(id=>{ const el=document.getElementById(id); if(el) el.onchange=e=>{ state[id]=e.target.value; render(); }; });
  // kanban cards
  document.querySelectorAll('.card[data-id]').forEach(card=>{
    card.onclick=e=>{ if(!card.classList.contains('dragging')) openDrawer(+card.dataset.id); };
    card.ondragstart=e=>{ dragId=+card.dataset.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; };
    card.ondragend=()=>{ card.classList.remove('dragging'); document.querySelectorAll('.col').forEach(c=>c.classList.remove('drop-on')); };
  });
  document.querySelectorAll('.col-body').forEach(col=>{
    const colEl = col.closest('.col');
    col.ondragover=e=>{ e.preventDefault(); colEl.classList.add('drop-on'); };
    col.ondragleave=()=>colEl.classList.remove('drop-on');
    col.ondrop=e=>{ e.preventDefault(); colEl.classList.remove('drop-on'); moveStage(dragId, col.dataset.stage); };
  });
}
let dragId=null;
function moveStage(id, stage){
  const l = LEADS.find(x=>x.id===id); if(!l || l.stage===stage) return;
  const from = stageById(l.stage).name, to = stageById(stage).name;
  l.stage = stage;
  if(!l.stageHistory) l.stageHistory=[];
  l.stageHistory.push({stage, date:TODAY_ISO});
  l.activities.unshift({date:TODAY_ISO, type:'Stage', note:`Moved from ${from} to ${to}.`, by:CURRENT_USER});
  l.lastTouch={date:TODAY_ISO, type:'Stage'};
  saveLead(l); render();
}

/* ---- CSV export (spreadsheet-friendly, includes stage-timing metrics) ---- */
function downloadCSV(){
  const esc = v => { v = (v==null?'':String(v)); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const cols = ['Name','Company','Email','Phone','Tier','Stage','Est Annual Fees','Source','Referred By','Origination Owner','Assigned To','Next Step','Next Step Due','Overdue','Stage Entered','Days In Current Stage','Last Touch','Lead Created'];
  const lines = [cols.join(',')];
  LEADS.forEach(l=>{
    const sh = (l.stageHistory&&l.stageHistory.length) ? l.stageHistory[l.stageHistory.length-1] : null;
    const entered = sh ? sh.date : (l.created||'');
    const row = [
      l.name, l.company, l.email, l.phone,
      (TIERS[l.tier]?TIERS[l.tier].label:l.tier),
      stageById(l.stage).name, l.value, l.source, l.referredBy,
      l.origination, l.owner,
      l.nextStep?l.nextStep.action:'', l.nextStep?l.nextStep.due:'',
      isOverdue(l)?'Yes':'No',
      entered, entered?daysAgo(entered):'',
      l.lastTouch?l.lastTouch.date:'', l.created||''
    ];
    lines.push(row.map(esc).join(','));
  });
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='titus-leads-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(a.href);
}

      </div>

      <div class="sect-title">Lead Details</div>
      <div class="dr-grid">
        <div class="field"><div class="l">Lead Source</div><div class="v">${l.source}</div></div>
        <div class="field"><div class="l">Referred By</div><div class="v">${l.referredBy}</div></div>
        <div class="field"><div class="l">Origination Owner</div><div class="v" style="display:flex;align-items:center;gap:7px"><span class="owner-chip">${initials(l.origination)}</span>${l.origination}</div></div>
        <div class="field"><div class="l">Assigned To</div><div class="v">${l.owner}</div></div>
        <div class="field"><div class="l">Email</div><div class="v"><a href="mailto:${l.email}">${l.email}</a></div></div>
        <div class="field"><div class="l">Phone</div><div class="v">${l.phone}</div></div>
        <div class="field"><div class="l">Client Tier</div><div class="v">${TIERS[l.tier].label} — ${TIERS[l.tier].desc}</div></div>
        <div class="field"><div class="l">Lead Created</div><div class="v">${fmtDate(l.created)} (${daysAgo(l.created)}d ago)</div></div>
      </div>

      <div class="sect-title">Move Stage</div>
      <div class="stage-pick" id="stagePick">${stagePick}</div>

      <div class="sect-title">Log a Touchpoint</div>
      <div class="logbox">
        <div class="lr">
          <select id="logType"><option>Call</option><option>Email</option><option>Meeting</option><option>Note</option><option>Proposal</option><option>Signed</option></select>
          <input id="logNext" placeholder="Set next step (optional)" />
          <input id="logNextDue" type="date" title="Next step due by" style="flex:0 0 150px" />
        </div>
        <textarea id="logNote" placeholder="What happened? Add a note…"></textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:9px"><button class="btn btn-navy" id="logSave">${svg(I.add,2.2)} Log Touchpoint</button></div>
      </div>

      <div class="sect-title">Activity Timeline</div>
      <div class="timeline">${tl}</div>

      <div style="margin-top:26px;padding-top:16px;border-top:1px solid var(--line);text-align:center">
        <button class="btn btn-ghost" id="drDelete" style="color:var(--danger);border-color:#f0d3d0">${svg(I.trash,2)} Delete this lead</button>
      </div>
    </div>`;
  document.getElementById('drClose').onclick=closeDrawer;
  document.getElementById('drDelete').onclick=async ()=>{
    if(confirm(`Delete ${l.name} (${l.company})? This permanently removes the lead and its history for everyone. This cannot be undone.`)){
      await deleteLead(id); closeDrawer(); render();
    }
  };
  document.getElementById('stagePick').querySelectorAll('button').forEach(b=>b.onclick=()=>{ moveStage(id,b.dataset.stage); openDrawer(id); });
  document.getElementById('logSave').onclick=()=>{
    const type=document.getElementById('logType').value;
    const note=document.getElementById('logNote').value.trim()||`${type} logged.`;
    const next=document.getElementById('logNext').value.trim();
    const nextDue=document.getElementById('logNextDue').value;
    l.activities.unshift({date:TODAY_ISO,type,note,by:CURRENT_USER});
    l.lastTouch={date:TODAY_ISO,type};
    if(next) l.nextStep={action:next, due:nextDue||plusDays(7)};
    else if(nextDue && l.nextStep) l.nextStep.due=nextDue;
    if(type==='Signed' && l.stage!=='won' && l.stage!=='onboarding') l.stage='won';
    saveLead(l); render(); openDrawer(id);
  };
  document.getElementById('overlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');
}
function closeDrawer(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('drawer').classList.remove('show'); state.selected=null; }

          <div><label>Phone</label><input id="a_phone" placeholder="(205) 555-0000" /></div>
          <div><label>Client Tier</label><select id="a_tier"><option value="I">Tier I — Business anchor</option><option value="II">Tier II — Personal w/ potential</option><option value="III">Tier III — Simple personal</option></select></div>
          <div><label>Est. Annual Fees</label><input id="a_value" type="number" placeholder="25000" /></div>
          <div><label>Lead Source</label><select id="a_source">${SOURCES.map(s=>`<option>${s}</option>`).join('')}</select></div>
          <div><label>Referred By</label><input id="a_ref" placeholder="Name / firm (optional)" /></div>
          <div><label>Origination Owner *</label><select id="a_orig">${OWNERS.map(o=>`<option>${o}</option>`).join('')}</select></div>
          <div><label>Assigned To</label><select id="a_owner">${OWNERS.map(o=>`<option>${o}</option>`).join('')}</select></div>
          <div><label>First Next Step</label><input id="a_next" placeholder="e.g. Book discovery call" /></div>
          <div><label>Next Step Due By</label><input id="a_nextdue" type="date" /></div>
        </div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" id="mCancel">Cancel</button><button class="btn btn-gold" id="mSave">Add Lead</button></div>
    </div>`;
  const m=document.getElementById('modal'); m.classList.add('show');
  document.getElementById('mClose').onclick=closeAdd;
  document.getElementById('mCancel').onclick=closeAdd;
  document.getElementById('mSave').onclick=saveAdd;
}
function closeAdd(){ document.getElementById('modal').classList.remove('show'); }
function saveAdd(){
  const v=id=>document.getElementById(id).value.trim();
  const name=v('a_name'); if(!name){ document.getElementById('a_name').focus(); document.getElementById('a_name').style.borderColor='var(--danger)'; return; }
  const id=Date.now();
  const lead={id, name, company:v('a_company')||'—', email:v('a_email')||'—', phone:v('a_phone')||'—',
    tier:v('a_tier'), stage:'new', value:+v('a_value')||0, source:v('a_source'), referredBy:v('a_ref')||'—',
    origination:v('a_orig'), owner:v('a_owner'), created:TODAY_ISO,
    nextStep:{action:v('a_next')||'Initial outreach', due:v('a_nextdue')||plusDays(7)},
    stageHistory:[{stage:'new', date:TODAY_ISO}],
    activities:[{date:TODAY_ISO, type:'Note', note:'Lead created.', by:CURRENT_USER}], lastTouch:{date:TODAY_ISO,type:'Note'}};
  LEADS.unshift(lead); saveLead(lead); closeAdd(); render();
  if(state.view==='dashboard'){ setView('pipeline'); }
  setTimeout(()=>openDrawer(id),120);
}

/* ============================ DATA / BACKUP ============================ */
function openData(){
  const count = LEADS.length;
  document.getElementById('modal').innerHTML = `
    <div class="modal-card" style="width:460px">
      <div class="modal-head"><h3>Data &amp; Backup</h3><button class="dr-close" id="dClose" style="color:var(--muted)">&times;</button></div>
      <div class="modal-body">
        <p style="font-size:13px;color:#54627a;line-height:1.5;margin-bottom:16px">${CLOUD
          ? `Your ${count} leads are stored securely in your shared cloud database and sync live across the team. Export a backup any time for your records.`
          : `Your ${count} leads are saved automatically to <b>this browser on this device</b>. They are not on a server and won't sync to other devices. Export a backup regularly — clearing browser data will erase them.`}</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-navy" id="dExport" style="justify-content:flex-start;padding:12px 14px">${svg(I.download,2)} Export backup (.json)</button>
          <button class="btn btn-ghost" id="dExportCsv" style="justify-content:flex-start;padding:12px 14px">${svg(I.download,2)} Export as spreadsheet (.csv)</button>
          <button class="btn btn-ghost" id="dImport" style="justify-content:flex-start;padding:12px 14px">${svg(I.upload,2)} Import / restore from file</button>
          <button class="btn btn-ghost" id="dClear" style="justify-content:flex-start;padding:12px 14px;color:var(--danger);border-color:#f0d3d0">${svg(I.trash,2)} Clear all leads (start fresh)</button>
          <button class="btn btn-ghost" id="dReset" style="justify-content:flex-start;padding:12px 14px">${svg(I.upload,2)} Reset to sample data</button>
        </div>
        <input type="file" id="dFile" accept="application/json,.json" style="display:none" />
        <div id="dMsg" style="font-size:12.5px;color:var(--good);margin-top:14px;min-height:16px"></div>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('show');
  document.getElementById('dClose').onclick=closeAdd;
  const msg=(t,ok=true)=>{ const m=document.getElementById('dMsg'); m.style.color=ok?'var(--good)':'var(--danger)'; m.textContent=t; };
  document.getElementById('dExport').onclick=()=>{
    const blob=new Blob([JSON.stringify(LEADS,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='titus-leads-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
    URL.revokeObjectURL(a.href); msg('Backup downloaded.');
  };
  document.getElementById('dExportCsv').onclick=()=>{ downloadCSV(); msg('Spreadsheet (.csv) downloaded.'); };
  document.getElementById('dImport').onclick=()=>document.getElementById('dFile').click();
  document.getElementById('dFile').onchange=e=>{
    const f=e.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d)||!d.length) throw 0;
      LEADS=ensureTouch(d); closeDrawer(); saveAll(); render(); msg('Imported '+d.length+' leads.');
    }catch(err){ msg('That file could not be read as a valid backup.',false); } };
    r.readAsText(f);
  };
  document.getElementById('dClear').onclick=async ()=>{
    if(!confirm('Delete ALL leads and start with a blank tracker? This removes the sample data (and any leads you\'ve added) for EVERYONE on the team. Export a backup first if you want a copy. This cannot be undone.')) return;
    const typed = prompt('Final check — this permanently deletes ALL leads for the entire team and cannot be undone.\n\nType  DELETE  (in capitals) to confirm:');
    if(typed !== 'DELETE'){ msg('Cancelled — nothing was deleted.', false); return; }
    await deleteAllLeads(); closeDrawer(); render(); msg('All leads deleted — you have a blank tracker.');
  };
  document.getElementById('dReset').onclick=async ()=>{
    if(confirm('Reset to the original sample data? This replaces the current leads with the demo set for everyone (export a backup first if needed).')){
      await deleteAllLeads(); LEADS=ensureTouch(JSON.parse(JSON.stringify(SEED_LEADS))); closeDrawer(); await saveAll(); render(); msg('Reset to sample data.');
    }
  };
}

/* ============================ EVENTS ============================ */
document.getElementById('overlay').onclick=closeDrawer;
document.getElementById('modal').onclick=e=>{ if(e.target.id==='modal') closeAdd(); };
document.getElementById('addBtnTop').onclick=openAdd;
document.getElementById('dataBtnTop').onclick=openData;
document.getElementById('dataBtnM').onclick=openData;
document.getElementById('helpBtnM').onclick=()=>setView('help');
const syncSearch=v=>{ state.search=v; if(v.trim() && state.view==='dashboard'){ setView('leads'); } else { render(); } };
document.getElementById('searchInput').oninput=e=>{ document.getElementById('searchInputM').value=e.target.value; syncSearch(e.target.value); };
document.getElementById('searchInputM').oninput=e=>{ document.getElementById('searchInput').value=e.target.value; syncSearch(e.target.value); };
document.getElementById('mSearchBtn').onclick=()=>document.getElementById('mSearchBar').classList.toggle('open');
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeDrawer(); closeAdd(); }});

/* ============================ INIT / AUTH ============================ */
renderNav();
document.getElementById('loginMark').innerHTML = `<img class="login-logo" src="${LOGO_LIGHT}" alt="Titus CPAs" />`;

if(CLOUD){
  setupAuthUI();
  initCloud();
} else {
  LEADS = ensureTouch(loadLeads());
  render();
  updateSaveStatus();
}

async function initCloud(){
  try{
    const { data } = await sb.auth.getSession();
    SESSION = data.session;
    sb.auth.onAuthStateChange((_e, s)=>{ SESSION=s; if(s) enterApp(); else showLogin(); });
    if(SESSION) enterApp(); else showLogin();
  }catch(e){ console.error('initCloud', e); showLogin(); }
}
function showLogin(){ document.getElementById('login').classList.add('show'); }
function hideLogin(){ document.getElementById('login').classList.remove('show'); }
let _rtBound=false;
async function enterApp(){
  hideLogin();
  CURRENT_USER = niceName(SESSION && SESSION.user ? SESSION.user.email : 'Team Member');
  setUserBadge();
  const b=document.getElementById('cloudBanner'); if(b){ b.style.display='block'; b.textContent='☁ Shared cloud mode — synced across your team'; }
  LEADS = await cloudLoad();
  if(!LEADS.length){ LEADS = ensureTouch(JSON.parse(JSON.stringify(SEED_LEADS))); await saveAll(); }
  render(); updateSaveStatus();
  if(!_rtBound){ subscribeRealtime(); _rtBound=true; }
}
function setupAuthUI(){
  const emailStep=document.getElementById('emailStep');
  const codeStep=document.getElementById('codeStep');
  const btn=document.getElementById('loginBtn');
  const verifyBtn=document.getElementById('verifyBtn');
  const msg=document.getElementById('loginMsg');
  let currentEmail='';
  const setMsg=(t,ok)=>{ msg.style.color=ok?'var(--good)':'var(--danger)'; msg.textContent=t; };

  btn.onclick=async ()=>{
    const email=document.getElementById('loginEmail').value.trim();
    if(!email||!email.includes('@')){ setMsg('Enter a valid work email.',false); return; }
    btn.textContent='Sending…'; btn.disabled=true;
    try{
      const { error } = await sb.auth.signInWithOtp({ email });
      if(error) throw error;
      currentEmail=email;
      emailStep.style.display='none'; codeStep.style.display='block';
      setMsg('We emailed a 6-digit code to '+email+'. Enter it above.', true);
      document.getElementById('loginCode').focus();
    }catch(e){ setMsg(e.message||'Could not send code.',false); }
    btn.textContent='Send me a code'; btn.disabled=false;
  };

  verifyBtn.onclick=async ()=>{
    const token=document.getElementById('loginCode').value.trim();
    if(!/^\d{6}$/.test(token)){ setMsg('Enter the 6-digit code from your email.',false); return; }
    verifyBtn.textContent='Verifying…'; verifyBtn.disabled=true;
    try{
      let { error } = await sb.auth.verifyOtp({ email: currentEmail, token, type:'email' });
      if(error){ const r = await sb.auth.verifyOtp({ email: currentEmail, token, type:'signup' }); if(r.error) throw error; }
      setMsg('Signed in — loading…', true);
      // onAuthStateChange (SIGNED_IN) calls enterApp()
    }catch(e){ setMsg(e.message||'That code did not work — check it or request a new one.',false); }
    verifyBtn.textContent='Verify & sign in'; verifyBtn.disabled=false;
  };

  document.getElementById('resendLink').onclick=()=>{
    codeStep.style.display='none'; emailStep.style.display='block';
    document.getElementById('loginCode').value=''; setMsg('',true);
    document.getElementById('loginEmail').focus();
  };
  document.getElementById('loginEmail').addEventListener('keydown',e=>{ if(e.key==='Enter') btn.click(); });
  document.getElementById('loginCode').addEventListener('keydown',e=>{ if(e.key==='Enter') verifyBtn.click(); });
}
function niceName(email){ const n=(email||'').split('@')[0].replace(/[._-]+/g,' ').trim(); return n? n.replace(/\b\w/g,c=>c.toUpperCase()) : 'Team Member'; }
function setUserBadge(){
  const av=document.querySelector('.avatar-me'); if(!av) return;
  av.textContent=initials(CURRENT_USER); av.title=CURRENT_USER+' — click to sign out'; av.style.cursor='pointer';
  av.onclick=async ()=>{ if(confirm('Sign out of Titus Lead Tracker?')){ try{ await sb.auth.signOut(); }catch(e){} location.reload(); } };
}
function subscribeRealtime(){
  try{
    sb.channel('leads-rt').on('postgres_changes',{event:'*',schema:'public',table:'leads'}, async ()=>{
      const sel=state.selected; LEADS=await cloudLoad(); render();
      if(sel && LEADS.find(l=>l.id===sel)) openDrawer(sel);
    }).subscribe();
  }catch(e){ console.error('realtime', e); }
}
</script>
</body>
</html>
