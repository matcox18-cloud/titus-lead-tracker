<style>body{margin:0}.who-name{color:#fff;font-weight:600;font-size:13px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);padding:20px}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:34px;width:100%;max-width:380px;text-align:center}
.login-brand{display:flex;gap:12px;align-items:center;justify-content:center;margin-bottom:18px}
.login-brand .wm{font-family:'Fraunces',serif;font-weight:600;letter-spacing:.14em;font-size:20px;color:var(--navy)}
.login-brand .sub{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-ink)}
.login-card h2{margin:6px 0 4px}
.login-in{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:12px 14px;font-size:15px;margin:14px 0 12px;text-align:center}
.login-in:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(19,43,73,.1)}
.btn.lg{width:100%;justify-content:center;padding:12px;font-size:14px;border-radius:10px}
.login-or{margin:14px 0;color:var(--faint);font-size:12px;position:relative}
.btn-link{background:none;border:0;color:var(--muted);font-size:12.5px;margin-top:12px;text-decoration:underline;cursor:pointer}
.login-msg{margin-top:14px;color:var(--bad);background:var(--bad-bg);border-radius:8px;padding:8px 10px;font-size:12.5px}</style>
</head>

/* ============================================================================
   TITUS — Time & Billing  (working prototype · v2)
   Role-scoped service items. Rate lives on the service, not the person.
   Brand: navy #132b49 / gold #d1af44 · Fraunces + Hanken Grotesk
   ----------------------------------------------------------------------------
   Service items mirror the firm's TaxDome rate card: each line is a
   (role × service-line) combination with its own code + rate. A team member
   only sees the service items for their role, plus shared internal codes.
   Cloud build: data persists to Supabase (Postgres) with row-level security.
   Auth via Supabase (email code or Microsoft SSO). CSV sync to TaxDome is next. Swap the SVG
   mark for the real Titus logo in <TitusMark/>.
   ========================================================================== */

/* ---------- styles ---------- */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;450;500;600;700&display=swap');

:root{
  --navy:#132b49; --navy-700:#1c3a5e; --navy-900:#0d1f37;
  --gold:#d1af44; --gold-soft:#e7d28a; --gold-ink:#8a6f1e;
  --paper:#f4f5f8; --surface:#ffffff; --surface-2:#fbfbfc;
  --ink:#1a2230; --muted:#6b7686; --faint:#9aa2af;
  --line:#e6e9ee; --line-strong:#d3d8e0;
  --good:#3f7d6e; --good-bg:#eaf3f0;
  --warn:#bd8a36; --warn-bg:#f7efdd;
  --bad:#b14b3a; --bad-bg:#f6e8e4;
  --bill:rgba(19,43,73,.045); --nonbill:rgba(120,120,120,.05);
  --shadow:0 1px 2px rgba(16,28,48,.06),0 8px 24px rgba(16,28,48,.06);
  --radius:14px;
}
*{box-sizing:border-box}
.tt-root{font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper);
  min-height:100vh;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.tt-root button{font-family:inherit;cursor:pointer}
.num{font-variant-numeric:tabular-nums lining-nums}
.serif{font-family:'Fraunces',Georgia,serif}
.muted{color:var(--muted)} .faint{color:var(--faint)}
input,select{font-family:inherit;color:var(--ink)}

.shell{display:flex;min-height:100vh}
.side{width:236px;flex:0 0 236px;background:var(--navy);color:#dfe6f0;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh}
.brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;gap:12px;align-items:center}
.brand .wm{font-family:'Fraunces',serif;font-weight:600;letter-spacing:.14em;font-size:18px;color:#fff}
.brand .sub{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-soft);margin-top:1px}
.nav{padding:12px 12px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:#c2cdde;
  padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;transition:.12s}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.on{background:rgba(209,175,68,.14);color:#fff}
.nav button.on .ic{color:var(--gold)}
.nav .ic{width:18px;height:18px;display:inline-flex;color:#8fa1bb}
.side-foot{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.whoami{display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:9px;background:var(--gold);color:var(--navy-900);font-weight:700;
  display:flex;align-items:center;justify-content:center;font-size:12.5px;flex:0 0 32px}
.whoami .who{flex:1;min-width:0}
.whoami select{background:transparent;border:0;color:#fff;font-weight:600;font-size:13px;width:100%;outline:none}
.whoami select option{color:#1a2230}

.adm-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;

.pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px}

.rep-filter{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--navy);background:var(--surface-2);

.seg-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.seg-tab{background:var(--surface);border:1px solid var(--line-strong);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--muted)}
.seg-tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.tbl td.c,.tbl th.c{text-align:center}
.cin{font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:6px 8px;width:100%;min-width:60px;outline:none}
.cin:focus{border-color:var(--navy);background:#fff;box-shadow:0 0 0 2px rgba(19,43,73,.08)}
.allow-chip{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700;
  background:var(--surface-2);border:1px solid var(--line-strong);color:var(--faint);cursor:pointer;user-select:none}
.allow-chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.csv-area{width:100%;height:120px;font-family:ui-monospace,monospace;font-size:12px;border:1px solid var(--line-strong);border-radius:8px;padding:10px;margin-top:8px;outline:none}
.map-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:8px 0 4px}
.map-row{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);font-weight:600}
.inv-in{background:transparent;border:1px solid transparent;border-radius:6px;padding:4px 6px}
.inv-in:hover{border-color:var(--line)} .inv-in:focus{border-color:var(--navy);background:#fff}
.guide{max-width:760px;display:flex;flex-direction:column;gap:14px}
.guide-card{padding:20px 22px}
.guide-card h3{margin:0 0 8px} .guide-card p{margin:0 0 8px;line-height:1.5}
.guide-card ul{margin:6px 0 0;padding-left:20px;line-height:1.6} .guide-card li{margin-bottom:5px}
.guide-card code{background:var(--surface-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:12.5px}
.iconbtn.listening{color:var(--bad);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.clickrow{cursor:pointer} .clickrow:hover td{background:var(--surface-2)}
@media print {
  .side,.mnav,.topbar,.fab,.no-print{display:none!important}

  .card{box-shadow:none!important;border:1px solid #d3d8e0!important;break-inside:avoid}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:16px;padding:16px 26px;background:var(--surface);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.h-title{font-family:'Fraunces',serif;font-size:21px;font-weight:600;letter-spacing:-.01em}
.h-sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.spacer{flex:1}
.content{padding:22px 26px 90px;max-width:1280px;width:100%}

.timer-chip{display:flex;align-items:center;gap:10px;border:1px solid var(--line-strong);background:var(--surface);
  border-radius:999px;padding:6px 7px 6px 14px}
.timer-chip.run{border-color:var(--gold);background:linear-gradient(0deg,rgba(209,175,68,.08),rgba(209,175,68,.08))}
.timer-dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.timer-chip.run .timer-dot{background:var(--good);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,125,110,.45)}70%{box-shadow:0 0 0 7px rgba(63,125,110,0)}100%{box-shadow:0 0 0 0 rgba(63,125,110,0)}}
.timer-time{font-variant-numeric:tabular-nums;font-weight:600;font-size:14.5px;letter-spacing:.02em}
.timer-meta{font-size:11.5px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);border-radius:10px;
  padding:8px 13px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.12s}

.btn.ghost{border-color:transparent;background:transparent}
.btn:disabled{opacity:.5;cursor:not-allowed}
.iconbtn{border:0;background:transparent;color:var(--muted);padding:5px;border-radius:8px;display:inline-flex}
.iconbtn:hover{background:rgba(19,43,73,.07);color:var(--ink)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-h{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
.card-h h3{font-family:'Fraunces',serif;font-size:15.5px;font-weight:600;margin:0}
.card-b{padding:16px 18px}

.wk{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.wk-nav{display:flex;align-items:center;gap:4px;border:1px solid var(--line-strong);border-radius:10px;background:var(--surface);padding:3px}

.wk-range{font-weight:600;font-size:14px;min-width:172px;text-align:center}

.rolehint{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);background:var(--surface);
  border:1px solid var(--line);border-radius:999px;padding:5px 12px}
.rolehint b{color:var(--navy)}

.grid-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow)}
table.grid{border-collapse:separate;border-spacing:0;width:100%;min-width:920px}
.grid th,.grid td{border-bottom:1px solid var(--line);text-align:left;font-size:13px}

.bcell{text-align:center;width:50px}

.grid tfoot td{background:var(--surface-2);font-weight:700;border-top:2px solid var(--line-strong);border-bottom:0;padding:11px 10px}
.grid tfoot td.daycell{font-variant-numeric:tabular-nums}
.daytot{font-size:13.5px}.daytot.over{color:var(--good)}.daytot.under{color:var(--faint)}
.delcol{width:34px}
.addrow td{padding:10px}.addrow .btn{border-style:dashed}
.recents{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.recent-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line-strong);
  border-radius:999px;padding:5px 12px 5px 9px;color:var(--ink);box-shadow:var(--shadow);transition:.12s}

.inv-meta{text-align:right;font-size:12px;color:var(--muted)}

.inv-to{display:flex;justify-content:space-between;margin:16px 2px}
.inv table{width:100%;border-collapse:collapse;margin-top:6px}

.empty{text-align:center;padding:48px 20px;color:var(--muted)}
